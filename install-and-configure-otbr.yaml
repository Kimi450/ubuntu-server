---
- name: Install and configure OpenThread Border Router
  hosts: all
  gather_facts: True
  vars:
    namespace_generic_services: generic-services
  tasks:
  - name: Native install
    # https://openthread.io/guides/border-router/build-native
    block:
    - name: install dependencies
      become: true
      apt:
        pkg: "{{ item }}"
        state: latest
      ignore_errors: yes
      loop:
        - git

    - name: Setup Open Thread Border Router
      block:
        - name: Clone OTBR
          # https://openthread.io/guides/border-router/build-native
          become: true
          shell: |
            rm -rf  {{ otbr_repo_dir }}
            git clone --depth=1 https://github.com/openthread/ot-br-posix {{ otbr_repo_dir }}
        - name: Setup OTBR
          # https://openthread.io/guides/border-router/build-native
          become: true
          shell: |
            cd {{ otbr_repo_dir }}
            ./script/bootstrap | tee {{ otbr_repo_dir }}/bootstrap-logs
            INFRA_IF_NAME={{ otbr.infra_if_name }} ./script/setup | tee {{ otbr_repo_dir }}/setup-logs

        - name: Setup OTBR agent to listen on 0.0.0.0
          become: true
          shell: |
            grep -q "\-\-rest\-listen\-address" /etc/default/otbr-agent || sudo sed -i 's/OTBR_AGENT_OPTS="/&--rest-listen-address 0.0.0.0 /' /etc/default/otbr-agent

        - name: Setup OTBR agent to have persistent data storage in {{ config_path }}
          become: true
          shell: |
            grep -q "\-\-data\-path" /etc/default/otbr-agent || sudo sed -i 's/OTBR_AGENT_OPTS="/&--data-path {{ config_path }} /' /etc/default/otbr-agent

        - name: Setup OTBR web port to 8080
          become: true
          shell: |
            echo 'OTBR_WEB_OPTS="-I 0.0.0.0 -p 8080"' > /etc/default/otbr-web

        - name: "Patch config to use correct Radio Co-Processor (RCP) device from the default {{ default_rcp_location }}"
          become: true
          shell: |
            # create a rule to have the relevant device always created as /dev/ttyRCP
            ID_VENDOR=$(udevadm info -n {{ otbr.rcp_location }} | egrep -e 'ID_VENDOR_ID' | head | cut -d = -f 2)
            ID_MODEL=$(udevadm info -n {{ otbr.rcp_location }} | egrep -e 'ID_MODEL_ID' | head | cut -d = -f 2)
            ID_SERIAL=$(udevadm info -n {{ otbr.rcp_location }} | egrep -e 'ID_SERIAL_SHORT' | head | cut -d = -f 2)
            echo SUBSYSTEM==\"tty\", ATTRS{idVendor}==\"${ID_VENDOR}\", ATTRS{idProduct}==\"${ID_MODEL}\", ATTRS{serial}==\"${ID_SERIAL}\", SYMLINK+=\"ttyRCP\" > /etc/udev/rules.d/99-rcp.rules

            udevadm control --reload-rules
            udevadm trigger

            # make OTBR use /dev/ttyRCP
            sed -i s:{{ default_rcp_location }}:/dev/ttyRCP:g /etc/default/otbr-agent

        - name: Start OTBR services
          become: true
          shell: |
            {{ otbr_repo_dir }}/script/server | tee {{ otbr_repo_dir }}/server-logs

        - name: create network if one doesnt exist
          # https://openthread.io/guides/border-router/form-network
          # https://github.com/Kimi450/ubuntu-server/issues/44
          become: true
          shell: |
            set -ex
            EC=$(ot-ctl dataset active | grep -q Network && echo 0 || echo 1)
            if [[ ${EC} -eq 0 ]]; then echo Dataset exists; exit 0; fi

            ot-ctl dataset init new

            # It is the symmetric key used for all encryption.
            # 32 characters of a-e and 0-9
            ot-ctl dataset networkkey {{ otbr.networkkey }}

            # Though less critical for encryption, the phone uses this for UI identification.
            ot-ctl dataset networkname {{ otbr.networkname }}

            # Used for mDNS discovery and identifying the mesh.
            # 16 characters of a-e and 0-9
            ot-ctl dataset extpanid {{ otbr.extpanid }}

            # The 16-bit ID used in the radio headers.
            # generate panid from extpanid
            EXT_PAN_ID={{ otbr.extpanid }}
            val1=0x$(echo ${EXT_PAN_ID} | cut -c1-4)
            val2=0x$(echo ${EXT_PAN_ID} | cut -c5-8)
            val3=0x$(echo ${EXT_PAN_ID} | cut -c9-12)
            val4=0x$(echo ${EXT_PAN_ID} | cut -c13-16)
            PAN_ID=$(printf '0x%04x' "$(( val1 ^ val2 ^ val3 ^ val4 ))")
            ot-ctl dataset panid ${PAN_ID}

            # Ensure this stays the same so devices dont have to scan the whole 2.4GHz spectrum.
            # between 11 and 24 inclusive
            ot-ctl dataset channel {{ otbr.channel }}

            # Keep the timestamp high (OpenThread prefers the dataset with the higher timestamp)
            ot-ctl dataset activetimestamp {{ otbr.activetimestamp }}

            # staged dataset
            ot-ctl dataset

            # commit it
            ot-ctl dataset commit active

            # see the active one
            ot-ctl dataset active

            ot-ctl ifconfig up
            ot-ctl thread start

            # you can reset the network using this
            # ot-ctl factoryreset

        - name: check ifconfig
          shell: |
            ifconfig wpan0

        - name: Create config directory on hostpath for python-matter-server
          file:
            path: "{{ charts.services.configs_dir }}/matter-server"
            state: directory
            mode: '0777'
          become: true

        - name: run matter server as a stateful set
          # hostNetwork is true because HA and OTBR are on host network too
          shell: |
            kubectl apply -f - <<EOF
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: matter-server
                namespace: {{ namespace_generic_services }}
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: matter-server
                template:
                  metadata:
                    labels:
                      app: matter-server
                  spec:
                    hostNetwork: true
                    dnsPolicy: ClusterFirstWithHostNet
                    containers:
                      - name: matter-server
                        image: ghcr.io/home-assistant-libs/python-matter-server:stable
                        ports:
                          - containerPort: 5580
                        volumeMounts:
                          - mountPath: /data
                            name: data
                    volumes:
                      - hostPath:
                          path: {{ charts.services.configs_dir }}/matter-server
                          type: ""
                        name: data
            EOF

    vars:
      otbr_repo_dir: "{{ basics.repos_dir }}/otbr"
      default_rcp_location: "/dev/ttyACM0"
      config_path: "{{ charts.services.configs_dir }}/otbr-agent"
